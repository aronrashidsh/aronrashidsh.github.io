<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аронрашид | Великий анал</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #d4af37;
            --text: #ffffff;
            --text-dim: #b0b0b0;
            --card: #111111;
            --danger: #990000;
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }

        .loader-text {
            color: var(--accent);
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }

        .progress-bar {
            width: 200px;
            height: 2px;
            background: #222;
            position: relative;
            overflow: hidden;
        }

        .progress-line {
            position: absolute;
            width: 0%;
            height: 100%;
            background: var(--accent);
            animation: progress 10s linear forwards;
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        body.loading {
            overflow: hidden;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
            padding-bottom: 50px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 50px;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 40px;
            margin-bottom: 50px;
        }

        .main-photo {
            width: 100%;
            border: 3px solid var(--accent);
            border-radius: 15px;
            filter: grayscale(0.2);
        }

        .header-info h1 {
            font-size: 4rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .status-box {
            background: var(--danger);
            display: inline-block;
            padding: 5px 20px;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .content-section {
            background: var(--card);
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            margin-bottom: 50px;
        }

        .content-section h2 {
            color: var(--accent);
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .content-section p {
            font-size: 1.25rem;
            margin-bottom: 30px;
            text-align: justify;
            text-indent: 40px;
        }

        .iq-image-container {
            text-align: center;
            margin: 40px 0;
        }

        .iq-image {
            max-width: 80%;
            border: 2px solid var(--accent);
            border-radius: 10px;
        }

        .faq-block {
            margin-bottom: 60px;
        }

        .faq-block h2 {
            color: var(--accent);
            margin-bottom: 30px;
        }

        details {
            background: #1a1a1a;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        summary {
            padding: 25px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            color: var(--accent);
        }

        .faq-content {
            padding: 0 25px 25px;
            font-size: 1.1rem;
            color: var(--text-dim);
        }

        .family-shrine {
            text-align: center;
            padding: 50px;
            background: #080808;
            border: 2px solid #222;
            border-radius: 40px;
        }

        .family-photo {
            width: 100%;
            max-width: 800px;
            border-radius: 15px;
            margin-top: 30px;
            border: 1px solid #444;
        }

        footer {
            text-align: center;
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid #333;
        }

        .sport-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 1.2rem;
            border: 1px solid var(--accent);
            padding: 10px 30px;
            border-radius: 50px;
            transition: 0.4s;
        }

        .sport-link:hover {
            background: var(--accent);
            color: #000;
        }
    </style>
</head>

</body>
</html>
