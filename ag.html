<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AronrashidGames: Sewer Scavenger 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #0f0; font-size: 24px; text-shadow: 2px 2px #000;
            pointer-events: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid white;
            border-radius: 50%; transform: translate(-50%, -50%);
        }
        #instructions {
            position: absolute; bottom: 20px; width: 100%;
            text-align: center; color: white; background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="ui">Собрано: <span id="score">0</span></div>
    <div id="crosshair"></div>
    <div id="instructions">WASD — Ходить | Мышь — Осмотреться (Кликни, чтобы начать)</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Настройка сцены ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.15); // Туман в канализации

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x050505);
        document.body.appendChild(renderer.domElement);

        // --- Освещение (Фонарик) ---
        const flashlight = new THREE.SpotLight(0xffffff, 50);
        flashlight.angle = Math.PI / 6;
        flashlight.penumbra = 0.3;
        flashlight.decay = 2;
        flashlight.distance = 20;
        camera.add(flashlight);
        flashlight.position.set(0, 0, 1);
        flashlight.target = camera; 
        scene.add(camera);

        const ambientLight = new THREE.AmbientLight(0x404040, 0.2); // Тусклый общий свет
        scene.add(ambientLight);

        // --- Создание канализации (Тоннель) ---
        const tunnelGeom = new THREE.CylinderGeometry(5, 5, 200, 32, 1, true);
        const tunnelMat = new THREE.MeshStandardMaterial({ 
            color: 0x333333, 
            side: THREE.BackSide,
            roughness: 0.8 
        });
        const tunnel = new THREE.Mesh(tunnelGeom, tunnelMat);
        tunnel.rotation.x = Math.PI / 2;
        scene.add(tunnel);

        // --- Генерация "целей" (Кал) ---
        const items = [];
        const itemGeo = new THREE.SphereGeometry(0.2, 8, 8);
        const itemMat = new THREE.MeshStandardMaterial({ color: 0x5c3a21 });

        for(let i = 0; i < 50; i++) {
            const item = new THREE.Mesh(itemGeo, itemMat);
            // Раскидываем по трубе
            const angle = Math.random() * Math.PI * 2;
            const radius = 4.5; 
            item.position.x = Math.cos(angle) * radius;
            item.position.y = Math.sin(angle) * radius;
            item.position.z = (Math.random() - 0.5) * 180;
            scene.add(item);
            items.push(item);
        }

        // --- Управление ---
        let score = 0;
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // Блокировка курсора
        document.body.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        // --- Игровой цикл ---
        function animate() {
            requestAnimationFrame(animate);

            // Движение
            const speed = 0.1;
            if (keys['KeyW']) camera.translateZ(-speed);
            if (keys['KeyS']) camera.translateZ(speed);
            if (keys['KeyA']) camera.translateX(-speed);
            if (keys['KeyD']) camera.translateX(speed);

            // Проверка столкновений (сбор)
            items.forEach((item, index) => {
                if (item.visible && camera.position.distanceTo(item.position) < 1) {
                    item.visible = false;
                    score++;
                    document.getElementById('score').innerText = score;
                    // Эффект вспышки фонарика при подборе
                    flashlight.intensity = 100;
                    setTimeout(() => flashlight.intensity = 50, 50);
                }
            });

            // Ограничение игрока внутри трубы
            const dist = Math.sqrt(camera.position.x**2 + camera.position.y**2);
            if (dist > 4.2) {
                camera.position.x *= 0.9;
                camera.position.y *= 0.9;
            }

            renderer.render(scene, camera);
        }

        animate();

        // Адаптация окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
